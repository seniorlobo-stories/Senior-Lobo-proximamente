<!-- @dsCard group="Components" viewport="700x520" name="Feedback" subtitle="Badges, toasts, alert, dialog, progress, spinner" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:26px;display:grid;grid-template-columns:1fr 1fr;gap:24px 28px;align-items:start}
  .cluster{display:flex;flex-direction:column;gap:13px}
  .cluster > .panel-label{margin:0}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
</style>
</head>
<body>

  <div class="cluster">
    <p class="panel-label">Badges</p>
    <div class="row">
      <span class="badge">Line</span>
      <span class="badge fill">Fill</span>
      <span class="badge"><span class="dot-c"></span>Status</span>
      <span class="badge count">Inbox <span class="num">12</span></span>
    </div>
    <p class="panel-label" style="margin-top:8px">Progress · Spinner</p>
    <div class="progress" style="max-width:220px">
      <div class="track"><span class="fill" style="width:68%"></span></div>
      <span class="pct">68%</span>
    </div>
    <svg class="spinner" viewBox="0 0 44 44"><circle cx="22" cy="22" r="18"/><path d="M22 4a18 18 0 0 1 18 18"/></svg>
  </div>

  <div class="cluster">
    <p class="panel-label">Toasts</p>
    <div class="toasts">
      <div class="toast success"><span class="ic"><svg class="icon s" viewBox="0 0 24 24"><path d="M5 12l4 5 10-11"/></svg></span>Guardado correctamente</div>
      <div class="toast info"><span class="ic"><svg class="icon s" viewBox="0 0 24 24"><path d="M12 8v.01M11 12h1v5h1"/></svg></span>Sincronizando cambios</div>
      <div class="toast warn"><span class="ic warn-i"><svg class="icon s" viewBox="0 0 24 24"><path d="M12 3l9 16H3z M12 10v4M12 17v.01"/></svg></span>Conexión inestable</div>
    </div>
    <p class="panel-label" style="margin-top:8px">Alert</p>
    <div class="alert"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3l9 16H3z M12 10v4M12 17v.01"/></svg><span><b>Atención.</b> 3 conflictos sin resolver.</span></div>
  </div>

  <div class="cluster" style="grid-column:1 / -1">
    <p class="panel-label">Dialog</p>
    <div class="modal">
      <h3>¿Eliminar capa?</h3>
      <p>Esta acción no se puede deshacer. El trazo dibujado se perderá permanentemente.</p>
      <div class="actions">
        <button class="btn ghost">Cancel</button>
        <button class="btn primary">Confirm</button>
      </div>
    </div>
  </div>

<script src="../../assets/linea-runtime.js"></script>
</body>
</html>
